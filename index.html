<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Boletas UNRC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --guinda-unrc: #9F2241; --dorado-unrc: #c8a355; --fondo-gris: #f4f4f4; --texto-oscuro: #333333; }
        body { font-family: 'Arial', sans-serif; background-color: #eef2f5; margin: 0; padding: 20px; color: var(--texto-oscuro); }
        .config-panel { background-color: white; padding: 20px 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 800px; margin: 0 auto 30px auto; }
        .config-panel h2 { color: var(--guinda-unrc); border-bottom: 2px solid var(--dorado-unrc); padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; width: 100%; }
        label { font-weight: bold; font-size: 0.9em; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
        .materias-section { background-color: var(--fondo-gris); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .materia-row { display: grid; grid-template-columns: 1fr 2fr 1fr auto; gap: 10px; margin-bottom: 10px; align-items: center; }
        button { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-add { background-color: #28a745; color: white; }
        .btn-remove { background-color: #dc3545; color: white; padding: 8px 12px; }
        .btn-pdf { background-color: var(--guinda-unrc); color: white; font-size: 1.2em; width: 100%; padding: 15px; }
        .boleta-container { display: none; background-color: white; max-width: 800px; margin: 0 auto; box-shadow: 0 0 15px rgba(0,0,0,0.2); padding: 40px; }
        .boleta-title { text-align: center; color: var(--guinda-unrc); font-size: 24px; margin-bottom: 20px; }
        .doc-info { text-align: center; font-size: 12px; color: #666; margin-bottom: 20px; font-style: italic; }
        .student-info-card { background-color: #fbfbfb; border: 1px solid #e0e0e0; padding: 15px; margin-bottom: 25px; }
        .info-row { display: flex; margin-bottom: 8px; font-size: 14px; }
        .info-label { width: 150px; font-weight: bold; }
        .grades-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .grades-table th { background-color: var(--guinda-unrc); color: white; padding: 10px; font-size: 13px; text-align: left; }
        .grades-table td { padding: 10px; border: 1px solid #eee; font-size: 13px; }
        .boleta-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .promedio-box { background-color: var(--guinda-unrc); color: white; padding: 15px; border-radius: 8px; }
        tr { page-break-inside: avoid; }
    </style>
</head>
<body>

    <div class="config-panel" id="configPanel">
        <h2>Generador de Boleta (Ejemplo)</h2>
        <div class="form-grid">
            <div class="form-group"><label>Nombres</label><input type="text" id="nombres" placeholder="Ej. Juan Carlos"></div>
            <div class="form-group"><label>Apellido Paterno</label><input type="text" id="apPaterno" placeholder="Ej. Pérez"></div>
            <div class="form-group"><label>Apellido Materno</label><input type="text" id="apMaterno" placeholder="Ej. López"></div>
            <div class="form-group"><label>Semestre</label><select id="semestre"><option value="1">1</option><option value="9">9</option></select></div>
            <div class="form-group">
                <label>Modalidad</label>
                <select id="modalidad">
                    <option value="Modelo Educativo Híbrido y Dual">Modelo Educativo Híbrido y Dual</option>
                    <option value="Presencial Híbrida">Presencial Híbrida</option>
                    <option value="Distancia Híbrida">Distancia Híbrida</option>
                </select>
            </div>
            <div class="form-group">
                <label>Unidad Académica</label>
                <select id="unidad">
                    <option value="Unidad Académica Azcapotzalco">Unidad Académica Azcapotzalco</option>
                    <option value="Unidad Académica Coyoacán">Unidad Académica Coyoacán</option>
                    <option value="Unidad Académica Gustavo A. Madero">Unidad Académica Gustavo A. Madero</option>
                    <option value="Unidad Académica Justo Sierra">Unidad Académica Justo Sierra</option>
                    <option value="Unidad Académica La Magdalena Contreras">Unidad Académica La Magdalena Contreras</option>
                    <option value="Unidad Académica Casco Santo Tomás">Unidad Académica Casco Santo Tomás</option>
                </select>
            </div>
            <div class="form-group">
                <label>Licenciatura</label>
                <select id="carrera">
                    <option value="Ingeniería en Control y Automatización">Ingeniería en Control y Automatización</option>
                    <option value="Licenciatura en Administración y Comercio">Licenciatura en Administración y Comercio</option>
                    <option value="Licenciatura en Tecnologías de Información">Licenciatura en Tecnologías de Información</option>
                </select>
            </div>
        </div>

        <div class="materias-section">
            <label>Unidades de Aprendizaje</label>
            <div id="materiasContainer">
                <div class="materia-row">
                    <input type="text" placeholder="Clave" class="mat-clave">
                    <input type="text" placeholder="Materia" class="mat-nombre">
                    <input type="number" placeholder="Calif." min="0" max="10" class="mat-calif">
                    <button class="btn-remove" onclick="removeRow(this)">X</button>
                </div>
            </div>
            <button class="btn-add" onclick="addMateria()">+ Agregar Materia</button>
        </div>

        <button class="btn-pdf" onclick="descargarPDF()">📥 Descargar Boleta Representativa</button>
        
        <div class="contador-caja">
            📊 Boletas generadas: <span id="numContador">...</span>
        </div>
        
        <div style="text-align: center; margin-top: 15px; font-size: 0.8em;">
            <a href="LEGAL.md" target="_blank" style="color: #666; text-decoration: underline;">Ver Aviso Legal</a>
        </div>
    </div>

    <!-- BOLETA -->
    <div class="boleta-container" id="boletaVista">
        <h2 class="boleta-title">Boleta de Calificaciones</h2>
        <div class="doc-info">DOCUMENTO REPRESENTATIVO NO OFICIAL</div>

        <div class="student-info-card">
            <div class="info-row"><div class="info-label">Alumno:</div><div class="info-value" id="outNombre"></div></div>
            <div class="info-row"><div class="info-label">Semestre:</div><div class="info-value" id="outSemestre"></div></div>
            <div class="info-row"><div class="info-label">Unidad:</div><div class="info-value" id="outUnidad"></div></div>
            <div class="info-row"><div class="info-label">Carrera:</div><div class="info-value" id="outCarrera"></div></div>
        </div>

        <table class="grades-table">
            <thead><tr><th>Clave</th><th>Materia</th><th>Calif.</th><th>Resultado</th></tr></thead>
            <tbody id="outTablaMaterias"></tbody>
        </table>

        <div class="boleta-footer">
            <p style="font-size: 11px; color: #666;">Fines ilustrativos.</p>
            <div class="promedio-box">PROMEDIO: <span id="outPromedio">0.00</span></div>
        </div>
    </div>

    <script>
        const urlGoogleScript = "https://script.google.com/macros/s/AKfycbxyltKA6_6e6PFgJ3mqQxlqNPMFOTL-xvdp0DcxK4D13NkJXFejJYwRvlz39CVzbMgb/exec"; 

        if(urlGoogleScript !== "TU_ENLACE_AQUI") {
            fetch(urlGoogleScript)
                .then(res => res.text())
                .then(num => document.getElementById("numContador").innerText = num);
        }

        function addMateria() {
            const container = document.getElementById('materiasContainer');
            const row = document.createElement('div');
            row.className = 'materia-row';
            row.innerHTML = `<input type="text" placeholder="Clave" class="mat-clave"><input type="text" placeholder="Materia" class="mat-nombre"><input type="number" placeholder="Calif." min="0" max="10" class="mat-calif"><button class="btn-remove" onclick="removeRow(this)">X</button>`;
            container.appendChild(row);
        }

        function removeRow(btn) { btn.parentElement.remove(); }

        function descargarPDF() {
            const nombre = `${document.getElementById('nombres').value} ${document.getElementById('apPaterno').value} ${document.getElementById('apMaterno').value}`.toUpperCase();
            document.getElementById('outNombre').innerText = nombre;
            document.getElementById('outSemestre').innerText = document.getElementById('semestre').value;
            document.getElementById('outUnidad').innerText = document.getElementById('unidad').value;
            document.getElementById('outCarrera').innerText = document.getElementById('carrera').value;
            
            const tbody = document.getElementById('outTablaMaterias'); tbody.innerHTML = '';
            let suma = 0; let count = 0;
            document.querySelectorAll('.materia-row').forEach(f => {
                const calif = parseFloat(f.querySelector('.mat-calif').value) || 0;
                suma += calif; count++;
                tbody.innerHTML += `<tr><td>${f.querySelector('.mat-clave').value}</td><td>${f.querySelector('.mat-nombre').value}</td><td>${calif}</td><td>${calif>=6?'Acreditada':'No Acreditada'}</td></tr>`;
            });
            document.getElementById('outPromedio').innerText = count > 0 ? (suma/count).toFixed(2) : '0.00';

            const el = document.getElementById('boletaVista');
            el.style.display = 'block';
            html2pdf().set({ margin: 10, filename: 'Boleta_Ejemplo.pdf', jsPDF: {format: 'letter'} }).from(el).save().then(() => {
                el.style.display = 'none';
                if(urlGoogleScript !== "TU_ENLACE_AQUI") fetch(urlGoogleScript + "?action=sumar");
            });
        }
    </script>
</body>
</html>
